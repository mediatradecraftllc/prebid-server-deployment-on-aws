name: Automated Fork Sync

on:
  schedule:
    - cron: '0 0 * * *' # Automatically triggers every night at midnight UTC
  workflow_dispatch: # Keeps a manual override button just in case you ever want it

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the automated bot to update your code without your password

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Merge AWS Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # Connects directly to the original AWS source repository
          git remote add upstream https://github.com/aws-solutions-library-samples/prebid-server-deployment-on-aws.git
          
          # Downloads and merges the updates automatically
          git fetch upstream main
          git checkout main
          git merge upstream/main --ff-only
          git push origin main
