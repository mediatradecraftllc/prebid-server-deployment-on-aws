# Wrote source/repos/prebid-server-deployment-on-aws/azure-pipelines.yml
trigger: none

schedules:
- cron: "0 0 * * *"
  displayName: Daily sync from AWS upstream
  branches:
    include:
    - main
  always: true

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0

- script: |
    set -e

    git remote add upstream https://github.com/aws-solutions-library-samples/prebid-server-deployment-on-aws.git
    git fetch upstream main

    BEHIND=$(git rev-list --count main..upstream/main)

    if [ "$BEHIND" -eq 0 ]; then
      echo "##[section]Branch is up to date with upstream. No action needed."
      exit 0
    fi

    echo "##[section]Upstream has $BEHIND new commit(s). Syncing..."
    git merge upstream/main --ff-only
    git push origin main
  displayName: Sync from AWS upstream